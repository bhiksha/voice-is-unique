# Isolated CPU env for the vendored DeepFry creak detector (VFI, feature #11).
# DeepFry pins old deps (Python 3.8, torch 1.12, numpy 1.22) incompatible with
# the analysis env, so it runs as a subprocess like DeepFormants.
name: deepfry
channels:
  - pytorch
  - conda-forge
dependencies:
  - python=3.8
  - pytorch=1.12.0
  - cpuonly
  - mkl=2024.0.0          # torch 1.12 needs iJIT_NotifyEvent; removed in mkl>=2025
  - numpy=1.22.3
  - pandas
  - pip
  - pip:
      - librosa==0.9.2
      - soundfile
      - resampy==0.2.2
      - numba==0.55.2
      - llvmlite==0.38.1
      - scikit-learn
